<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация / Вход - IDA TV</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .form-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        label { font-size: 13px; color: #666; display: block; margin-top: 10px; }
        .checkbox-group { display: flex; align-items: flex-start; gap: 10px; margin-top: 15px; font-size: 13px; color: #444; }
        .checkbox-group input { width: auto; margin: 0; margin-top: 3px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold; }
        button:hover { background: #0056b3; }
        .hidden { display: none !important; } /* Добавлено !important для гарантии скрытия */
        .section-title { font-weight: bold; border-bottom: 1px solid #eee; margin-top: 15px; padding-bottom: 5px; color: #007bff; }
    </style>
</head>
<body>

<div class="form-box">
    <h2 id="title">Создать аккаунт IDA TV</h2>
    <form id="mainForm">
        <input type="email" id="email" placeholder="E-mail (обязательно)" required>
        <input type="password" id="pass" placeholder="Пароль (мин. 6 знаков)" required>

        <div id="regFields">
            <div class="section-title">Личные данные</div>
            <div class="grid">
                <input type="text" id="fname" placeholder="Имя">
                <input type="text" id="lname" placeholder="Фамилия">
            </div>
            <input type="tel" id="phone" placeholder="Номер телефона (например +372...)">

            <div class="section-title">Адрес установки</div>
            <input type="text" id="city" placeholder="Город">
            <div class="grid">
                <input type="text" id="street" placeholder="Улица">
                <input type="text" id="house" placeholder="Дом / Кв">
            </div>

            <div class="section-title">Параметры услуги</div>
            <label>Тип услуги:</label>
            <select id="serviceType">
                <option value="Playlist">Только Плейлист</option>
                <option value="Remote">Удалённое подключение</option>
                <option value="On-site">Настройка по адресу</option>
            </select>

            <label>Ваше устройство:</label>
            <select id="deviceType">
                <option value="Smart TV LG">Smart TV: LG</option>
                <option value="Smart TV Samsung">Smart TV: Samsung</option>
                <option value="Android TV">Android TV / Приставка</option>
                <option value="Rent Box">Аренда приставки</option>
                <option value="Unknown">Я не знаю, что у меня</option>
            </select>

            <label>Количество устройств:</label>
            <select id="devicesCount">
                <option value="1">1 устройство</option>
                <option value="2">2 устройства</option>
                <option value="3">3 устройства</option>
                <option value="4">4 устройства</option>
                <option value="5">5 устройств</option>
            </select>

            <div class="checkbox-group">
                <input type="checkbox" id="agree">
                <label for="agree">Я согласен с правилами сервиса и на рассылку подписки сайта <strong>IDA TV</strong></label>
            </div>
        </div>

        <button type="submit" id="submitBtn">Зарегистрироваться</button>
        <p style="text-align:center; font-size: 14px;">
            <a href="#" onclick="toggleMode(); return false;" id="toggleLink" style="color: #007bff; text-decoration: none;">Уже есть аккаунт? Войти</a>
        </p>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        storageBucket: "mytv-service-a212c.firebasestorage.app",
        messagingSenderId: "297453631537",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Считываем параметр из URL (?mode=login)
    const urlParams = new URLSearchParams(window.location.search);
    let isLogin = urlParams.get('mode') === 'login';

    // Функция обновления интерфейса
    function updateUI() {
        const regFields = document.getElementById('regFields');
        const title = document.getElementById('title');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');

        if (isLogin) {
            regFields.classList.add('hidden');
            title.innerText = 'Вход в кабинет';
            submitBtn.innerText = 'Войти';
            toggleLink.innerText = 'Нет аккаунта? Зарегистрироваться';
        } else {
            regFields.classList.remove('hidden');
            title.innerText = 'Создать аккаунт IDA TV';
            submitBtn.innerText = 'Зарегистрироваться';
            toggleLink.innerText = 'Уже есть аккаунт? Войти';
        }

        // Управляем атрибутом required
        const inputs = regFields.querySelectorAll('input, select');
        inputs.forEach(el => {
            if (isLogin) el.removeAttribute('required');
            else el.setAttribute('required', '');
        });
    }

    // Делаем функцию доступной для onclick
    window.toggleMode = () => {
        isLogin = !isLogin;
        updateUI();
    };

    // Запускаем UI при загрузке
    updateUI();

    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = 'dashboard.html';
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const user = res.user;

                const userData = {
                    fname: document.getElementById('fname').value,
                    lname: document.getElementById('lname').value,
                    phone: document.getElementById('phone').value,
                    city: document.getElementById('city').value,
                    address: `${document.getElementById('street').value}, ${document.getElementById('house').value}`,
                    service: document.getElementById('serviceType').value,
                    device: document.getElementById('deviceType').value,
                    count: document.getElementById('devicesCount').value,
                    status: 'waiting',
                    playlist: '',
                    manual: '',
                    arveNr: '',
                    expiry: '',
                    comment: '',
                    regDate: new Date().toLocaleDateString()
                };

                await setDoc(doc(db, "users", user.uid), userData);

                const botToken = "8544750089:AAHRGQemoD5zCGLn9R70Ok2d1NsCAShazpc";
                const chatId = "1084236547";
                const msg = `🚀 НОВЫЙ КЛИЕНТ IDA TV!\n👤 ${userData.fname} ${userData.lname}\n📞 ${userData.phone}\n📍 ${userData.city}, ${userData.address}\n📺 Услуга: ${userData.service}\n📱 Устройство: ${userData.device}`;
                
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`)
                .catch(err => console.error("Telegram error:", err));

                alert('Аккаунт создан! Переходим в личный кабинет.');
                window.location.href = 'dashboard.html';
            }
        } catch (err) { 
            console.error(err);
            if (err.code === 'auth/wrong-password') alert("Неверный пароль!");
            else if (err.code === 'auth/user-not-found') alert("Пользователь не найден!");
            else if (err.code === 'auth/email-already-in-use') alert("Этот E-mail уже занят!");
            else alert("Ошибка: " + err.message); 
        }
    });
</script>
</body>
</html>
