<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка IDA TV - PRO</title>
    <!-- ЗАЩИТА: Скрипт проверки срабатывает мгновенно до загрузки тела страницы -->
    <script>
        if (sessionStorage.getItem('admin_access') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .admin-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .broadcast-panel { background: #fff3cd; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; margin-bottom: 20px; }
        .broadcast-panel h3 { margin-top: 0; color: #856404; font-size: 16px; }
        .broadcast-panel textarea { width: 100%; height: 50px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        
        .broadcast-btns { margin-top: 10px; display: flex; gap: 10px; }
        .btn-broadcast { background: #ffc107; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-clear-all { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* Стили для верхних кнопок управления */
        .top-nav { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
        .btn-logout { background: #343a40; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-external { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .btn-external:hover { background: #0056b3; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
        th { background-color: #007bff; color: white; }
        input, select, textarea { width: 95%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 3px; font-size: 12px; font-family: sans-serif; }
        
        .btn-save { background: #28a745; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 5px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 11px; width: 100%; }
        .pagination { margin-top: 20px; display: flex; justify-content: center; gap: 5px; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
        .page-btn.active { background: #007bff; color: white; }
        
        .info-block { line-height: 1.4; margin-bottom: 5px; }
        .info-label { color: #666; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .admin-note { background: #f9f9f9; border: 1px solid #eee; height: 60px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="top-nav">
        <!-- Кнопка на другой сайт -->
        <a href="https://ida-tv-setup-tv-admin.vercel.app/" target="_blank" class="btn-external">Открыть Панель 2 ↗</a>
        <button class="btn-logout" onclick="adminLogout()">Выйти</button>
    </div>
    
    <h1>Управление IDA TV</h1>

    <div class="broadcast-panel">
        <h3>📢 Управление уведомлениями</h3>
        <textarea id="massMsg" placeholder="Текст для ВСЕХ клиентов..."></textarea>
        <div class="broadcast-btns">
            <button class="btn-broadcast" onclick="sendBroadcast()">Отправить всем</button>
            <button class="btn-clear-all" onclick="clearAllBroadcasts()">Убрать у всех</button>
        </div>
    </div>
    
    <table id="userTable">
        <thead>
            <tr>
                <th>Клиент / Контакты</th>
                <th>Детали заказа / Адрес</th>
                <th>Статус</th>
                <th>Доступы</th>
                <th>Счет / Сообщение / <br><strong>Заметка (скрыто)</strong></th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="pagination" class="pagination"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAutk3dhPPtonZJ_osnwqqm1bm4Q2de4qI",
        authDomain: "mytv-service-a212c.firebaseapp.com",
        projectId: "mytv-service-a212c",
        storageBucket: "mytv-service-a212c.firebasestorage.app",
        messagingSenderId: "297453631537",
        appId: "1:297453631537:web:90e836440825b23a173d10"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allUsers = [];
    let currentPage = 1;
    const rowsPerPage = 15;

    const translateService = (val) => {
        const dict = {
            'Playlist': 'Плейлист',
            'Remote': 'Удалённое подкл.',
            'On-site': 'Настройка на месте'
        };
        return dict[val] || val;
    };

    onSnapshot(collection(db, "users"), (snapshot) => {
        allUsers = [];
        snapshot.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
        renderTable();
    });

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "";
        const start = (currentPage - 1) * rowsPerPage;
        const paginated = allUsers.slice(start, start + rowsPerPage);

        paginated.forEach(u => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="info-block"><strong>${u.fname || ''} ${u.lname || ''}</strong></div>
                    <div class="info-block"><span class="info-label">Тел:</span> ${u.phone || ''}</div>
                </td>
                <td>
                    <div class="info-block"><span class="info-label">Услуга:</span> ${translateService(u.service)}</div>
                    <div class="info-block"><span class="info-label">Устр:</span> ${u.device || ''} (${u.count || 0})</div>
                    <div class="info-block"><span class="info-label">Адрес:</span> ${u.city || ''}, ${u.address || ''}</div>
                </td>
                <td>
                    <select id="st-${u.id}">
                        <option value="waiting" ${u.status=='waiting'?'selected':''}>Ожидание</option>
                        <option value="pending_payment" ${u.status=='pending_payment'?'selected':''}>Оплата</option>
                        <option value="approved" ${u.status=='approved'?'selected':''}>Одобрено</option>
                    </select>
                </td>
                <td>
                    <input type="text" id="pl-${u.id}" value="${u.playlist||''}" placeholder="Плейлист">
                    <input type="text" id="mn-${u.id}" value="${u.manual||''}" placeholder="Инструкция">
                </td>
                <td>
                    <input type="text" id="ar-${u.id}" value="${u.arveNr||''}" placeholder="Счет № / Срок">
                    <input type="text" id="cm-${u.id}" value="${u.comment||''}" placeholder="Сообщение клиенту">
                    <textarea id="nt-${u.id}" class="admin-note" placeholder="Заметка для себя">${u.adminNote || ''}</textarea>
                </td>
                <td>
                    <button class="btn-save" onclick="saveUser('${u.id}')">Save</button>
                    <button class="btn-delete" onclick="deleteUser('${u.id}','${u.fname}')">Del</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
        renderPagination();
    }

    window.saveUser = async (id) => {
        try {
            await updateDoc(doc(db, "users", id), {
                status: document.getElementById(`st-${id}`).value,
                playlist: document.getElementById(`pl-${id}`).value,
                manual: document.getElementById(`mn-${id}`).value,
                arveNr: document.getElementById(`ar-${id}`).value,
                comment: document.getElementById(`cm-${id}`).value,
                adminNote: document.getElementById(`nt-${id}`).value
            });
            alert("Данные сохранены!");
        } catch (e) { alert("Ошибка!"); }
    };

    window.sendBroadcast = async () => {
        const text = document.getElementById('massMsg').value;
        if(!text) return alert("Введите текст!");
        const querySnapshot = await getDocs(collection(db, "users"));
        querySnapshot.forEach(async (uDoc) => {
            await updateDoc(doc(db, "users", uDoc.id), { comment: text });
        });
        alert("Отправлено всем!");
    };

    window.clearAllBroadcasts = async () => {
        if(!confirm("Удалить сообщения у ВСЕХ клиентов?")) return;
        const querySnapshot = await getDocs(collection(db, "users"));
        querySnapshot.forEach(async (uDoc) => {
            await updateDoc(doc(db, "users", uDoc.id), { comment: "" });
        });
        alert("Сообщения удалены у всех!");
    };

    window.deleteUser = async (id, name) => { if(confirm(`Удалить ${name}?`)) await deleteDoc(doc(db,"users",id)); };
    
    window.adminLogout = () => {
        sessionStorage.removeItem('admin_access');
        window.location.href = 'admin-login.html';
    };

    window.changePage = (p) => {
        currentPage = p;
        renderTable();
    };

    function renderPagination() {
        const pag = document.getElementById('pagination');
        pag.innerHTML = "";
        const pages = Math.ceil(allUsers.length / rowsPerPage);
        for(let i=1; i<=pages; i++) {
            const b = document.createElement('button');
            b.innerText = i; b.className = `page-btn ${i==currentPage?'active':''}`;
            b.onclick = () => window.changePage(i);
            pag.appendChild(b);
        }
    }
</script>
</body>
</html>
